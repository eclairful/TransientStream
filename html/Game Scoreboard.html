    <!-- Override script for before page load -->
    <script>
      /**
       * Returns the value of a css variable
       * @param {string} key the key to the var (without dashes)
       * @returns {string} the value
       */
      function getVarFromCSS(key) {
        let styles = window.getComputedStyle(document.querySelector(":root"));
        return styles.getPropertyValue("--" + key);
      }

      /**
       * Sets a css variable
       * @param {string} key of the css var (without dashes)
       * @param {string} val the string value to assign to the var
       */
      function setCSSVar(key, val) {
        let root = document.querySelector(":root");
        root.style.setProperty("--" + key, val);
      }

      // evil hacky override of the color function
      getHexColor = function (color) {
        switch (color) {
          case "Red":
            return getVarFromCSS("p1Color");
          case "Blue":
            return getVarFromCSS("p2Color");
          case "Yellow":
            return "#ffcb00";
          case "Green":
            return "#00b200";
          case "CPU":
            return "#808080";
          default:
            throw new TypeError(
              `Expected a valid color from Melee Ghost Streamer, but got '${color}' instead.

Valid colors: Red | Blue | Yellow | Green | CPU`,
            ); // i know this looks ugly don't come for me pls 🥺🥺🥺
        }
      };
    </script>

    <!-- Script for monitoring elements -->
    <script defer>
      function elemMonitorTick() {
        let isDevMode = getVarFromCSS("DEV_MODE") === "true";

        // apply dev mode changes
        if (isDevMode) {
          if (document.body.style.backgroundColor !== "black")
            document.body.style.backgroundColor = "black"; // fuck you its my background color

          // also remove pesky intro div that gets in the way of inspect element
          if (document.getElementById("overlayIntro"))
            document.getElementById("overlayIntro").remove();
        }

        // loop through all elements
        let elems = document.querySelectorAll("body > div *");
        for (let i = 0; i < elems.length; i++) {
          let elem = elems[i];

          if (!elem.style) continue;

          if (elem.style.opacity == "0") elem.style.display = "none";
          else if (elem.style.opacity) elem.style.display = "block";

          if (getVarFromCSS("teamLabelBrightness").endsWith("%")) {
            let percent = parseFloat(
              getVarFromCSS("teamLabelBrightness").replace("%", ""),
            );
            let raw = (percent / 100) * 255;

            setCSSVar("teamLabelBrightness", raw);
          }
        }

        // RAHHHH I JUST WANNA GO TO SLEEP!!!!
        // SET THE OPACITY NO MATTER WHAT
        document.getElementById("overlayRound").style.opacity =
          getVarFromCSS("round_opacity");
      }

      setInterval(elemMonitorTick, 250);
    </script>
